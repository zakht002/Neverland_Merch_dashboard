<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <style>
    :root { 
      --bg-main: #06131c; 
      --bg-card: #0d1f2d; 
      --aurora: #00e5ff; 
      --text: #ffffff;
      --grey: #808080;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg-main); color: var(--text); padding: 30px; margin: 0; }
    h2 { font-weight: 600; margin-bottom: 25px; }
    
    .tabs { margin-bottom: 30px; display: flex; gap: 20px; border-bottom: 1px solid #134e5e; padding-bottom: 10px; }
    .tab-button { padding: 8px 16px; border: none; cursor: pointer; background: transparent; color: var(--grey); font-family: inherit; font-size: 14px; transition: 0.3s; }
    .tab-button.active { color: var(--aurora); font-weight: 600; }
    
    .tab-content { display: none; } 
    .tab-content.active { display: block; }
    
    .dashboard-card { background: var(--bg-card); padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #134e5e; }
    .chart-container { height: 300px; width: 100%; position: relative; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { color: var(--aurora); text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid #134e5e; font-size: 14px; }
    td a { color: var(--aurora); text-decoration: none; font-weight: 600; }
    
    #title-summary-target { margin-bottom: 15px; font-weight: 600; color: var(--aurora); font-size: 18px; }

    .sub-tabs { display: flex; gap: 15px; margin-bottom: 20px; background: rgba(19, 78, 94, 0.2); padding: 10px; border-radius: 8px; }
    .sub-tab-button { padding: 6px 12px; border: none; background: transparent; color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px; }
    .sub-tab-button.active { background: var(--aurora); color: var(--bg-main); font-weight: 600; }
    .sub-tab-content { display: none; }
    .sub-tab-content.active { display: block; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  </style>
</head>
<body>

  <h2>Dashboard</h2>

  <div class="tabs">
    <button class="tab-button active" onclick="showTab('main', this)">CURRENT BATCH</button>
    <button class="tab-button" onclick="showTab('breakout', this)">CATEGORIES</button>
    <button class="tab-button" onclick="showTab('title', this)">TITLE</button>
    <button class="tab-button" onclick="showTab('itvx-performance', this)">ITVX ALL TITLES PERFORMANCE</button>
  </div>

  <div id="main" class="tab-content active">
    <div class="dashboard-card"><table id="main-table"></table></div>
  </div>

  <div id="breakout" class="tab-content">
    <div class="dashboard-card">
      <h3>% Reach Performance</h3>
      <button onclick="downloadRawData('Breakout % Reach','F40:K44','Reach_Data.csv')">Download Data</button>
      <div class="chart-container"><canvas id="chart-reach"></canvas></div>
    </div>
    <div class="dashboard-card">
      <h3>Hours Streamed Performance</h3>
      <div class="chart-container"><canvas id="chart-hours"></canvas></div>
    </div>
  </div>

  <div id="title" class="tab-content">
    <div class="dashboard-card">
      <div id="title-summary-target"></div>
      <table id="title-table"></table>
      <div style="display: flex; gap: 20px; margin-top: 30px;">
        <div class="chart-container" style="width: 50%;"><canvas id="chart-impressions"></canvas></div>
        <div class="chart-container" style="width: 50%;"><canvas id="chart-plays"></canvas></div>
      </div>
    </div>
  </div>

  <!-- NEW 4TH TOP LEVEL NAVIGATION PANEL -->
  <div id="itvx-performance" class="tab-content">
    <div class="sub-tabs">
      <button class="sub-tab-button active" onclick="showSubTab('monthly-engagement-view', this)">Monthly Engagement</button>
      <button class="sub-tab-button" onclick="showSubTab('category-overview-view', this)">Category Overview</button>
      <button class="sub-tab-button" onclick="showSubTab('clean-performance-view', this)">Overall Performance ITD</button>
    </div>

    <div id="monthly-engagement-view" class="sub-tab-content active">
      <div class="dashboard-card">
        <h3>% Reach by Month</h3>
        <div class="chart-container"><canvas id="chart-monthly-reach"></canvas></div>
      </div>
      <div class="dashboard-card">
        <h3>Total Hrs by Month</h3>
        <div class="chart-container"><canvas id="chart-monthly-hours"></canvas></div>
      </div>
    </div>

    <div id="category-overview-view" class="sub-tab-content">
      <div class="dashboard-card">
        <h3>Breakout Tiers</h3>
        <div class="grid-2">
          <div>
            <h4>Breakout % Reach</h4>
            <div class="chart-container"><canvas id="chart-cat-breakout-reach"></canvas></div>
          </div>
          <div>
            <h4>Breakout Hours</h4>
            <div class="chart-container"><canvas id="chart-cat-breakout-hours"></canvas></div>
          </div>
        </div>
      </div>
      <div class="dashboard-card">
        <h3>Premium Tiers</h3>
        <div class="grid-2">
          <div>
            <h4>Premium % Reach</h4>
            <div class="chart-container"><canvas id="chart-cat-premium-reach"></canvas></div>
          </div>
          <div>
            <h4>Premium Hours</h4>
            <div class="chart-container"><canvas id="chart-cat-premium-hours"></canvas></div>
          </div>
        </div>
      </div>
      <div class="dashboard-card">
        <h3>Library Tiers</h3>
        <div class="grid-2">
          <div>
            <h4>Library % Reach</h4>
            <div class="chart-container"><canvas id="chart-cat-library-reach"></canvas></div>
          </div>
          <div>
            <h4>Library Hours</h4>
            <div class="chart-container"><canvas id="chart-cat-library-hours"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <div id="clean-performance-view" class="sub-tab-content">
      <div class="dashboard-card" style="overflow-x:auto;">
        <h3>Clean Performance ITD (Top 20 Titles ordered by Reach %)</h3>
        <table id="clean-performance-table"></table>
      </div>
    </div>
  </div>

  <script>
    let chartLoaded = false;
    let chartImp, chartPlay;
    let instancesOfCharts = {};

    function showTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(btn) btn.classList.add('active');

      if(id === 'breakout' && !chartLoaded) {
        google.script.run.withSuccessHandler(d => {
          renderChart('chart-reach', d.reach, true);
          renderChart('chart-hours', d.hours, false);
        }).getBreakoutChartData();
        chartLoaded = true;
      }
      if(id === 'itvx-performance') {
        loadMonthlyEngagementDashboard();
        loadCategoryOverviewDashboard();
        loadCleanPerformanceTableData();
      }
    }

    function showSubTab(id, btn) {
      const container = btn.closest('.tab-content');
      container.querySelectorAll('.sub-tab-content').forEach(t => t.classList.remove('active'));
      container.querySelectorAll('.sub-tab-button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function renderChart(id, data, isPercent) {
      const formatVal = (v) => isPercent ? (v*100).toFixed(1)+'%' : (v >= 1000 ? (v/1000).toFixed(0)+'k' : v);
      if(instancesOfCharts[id]) { instancesOfCharts[id].destroy(); }
      instancesOfCharts[id] = new Chart(document.getElementById(id).getContext('2d'), {
        plugins: [ChartDataLabels],
        data: { labels: data.titles, datasets: [
          { type: 'bar', label: '7D Fact', data: data.fact7, backgroundColor: '#00d2ff' },
          { type: 'bar', label: '28D Fact', data: data.fact28, backgroundColor: '#134e5e' },
          { type: 'bar', label: 'Current', data: data.currentFact, backgroundColor: '#808080' },
          { type: 'line', label: '7D Goal', data: data.goal7, borderColor: '#ff7675', pointRadius: 0 },
          { type: 'line', label: '28D Goal', data: data.goal28, borderColor: '#1dd1a1', pointRadius: 0 }
        ]},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { 
            legend: { position: 'bottom', labels: { color: '#ffffff' } },
            datalabels: { color: '#fff', anchor: 'end', align: 'top', formatter: formatVal }
          },
          scales: { y: { ticks: { color: '#ffffff', callback: formatVal } }, x: { ticks: { color: '#ffffff' } } }
        }
      });
    }

    // ===== NEW DASHBOARD RENDERING ENGINES =====
    function loadMonthlyEngagementDashboard() {
      google.script.run.withSuccessHandler(d => {
        const fmt = (v) => v >= 1000 ? (v/1000).toFixed(1)+'k' : v;
        
        if(instancesOfCharts['chart-monthly-reach']) { instancesOfCharts['chart-monthly-reach'].destroy(); }
        instancesOfCharts['chart-monthly-reach'] = new Chart(document.getElementById('chart-monthly-reach').getContext('2d'), {
          plugins: [ChartDataLabels],
          data: {
            labels: d.reach.labels,
            datasets: [
              { type: 'bar', label: 'Total Streamers', data: d.reach.values, backgroundColor: '#00d2ff' },
              { type: 'line', label: 'Average Benchmark', data: new Array(d.reach.labels.length).fill(d.reach.avg), borderColor: '#ff7675', borderDash: [5, 5], pointRadius: 0 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#fff' } }, datalabels: { color: '#fff', anchor: 'end', align: 'top', formatter: fmt } },
            scales: { y: { ticks: { color: '#fff', callback: fmt } }, x: { ticks: { color: '#fff' } } }
          }
        });

        if(instancesOfCharts['chart-monthly-hours']) { instancesOfCharts['chart-monthly-hours'].destroy(); }
        instancesOfCharts['chart-monthly-hours'] = new Chart(document.getElementById('chart-monthly-hours').getContext('2d'), {
          plugins: [ChartDataLabels],
          data: {
            labels: d.hours.labels,
            datasets: [
              { type: 'bar', label: 'Total Hours ITD', data: d.hours.values, backgroundColor: '#134e5e' },
              { type: 'line', label: 'Average Benchmark', data: new Array(d.hours.labels.length).fill(d.hours.avg), borderColor: '#1dd1a1', borderDash: [5, 5], pointRadius: 0 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#fff' } }, datalabels: { color: '#fff', anchor: 'end', align: 'top', formatter: fmt } },
            scales: { y: { ticks: { color: '#fff', callback: fmt } }, x: { ticks: { color: '#fff' } } }
          }
        });
      }).getMonthlyEngagementData();
    }

    function createTierChart(id, label, labels, values, includeBenchmarks, isPercent) {
      const fmt = (v) => isPercent ? (v*100).toFixed(1)+'%' : (v >= 1000 ? (v/1000).toFixed(0)+'k' : v);
      const datasets = [{ type: 'bar', label: label, data: values, backgroundColor: isPercent ? '#00e5ff' : '#1dd1a1' }];
      
      if(includeBenchmarks) {
        datasets.push({ type: 'line', label: 'Breakout 7D (40k)', data: new Array(labels.length).fill(40000), borderColor: '#ff7675', borderDash: [3, 3], pointRadius: 0 });
        datasets.push({ type: 'line', label: 'Breakout 28D (115k)', data: new Array(labels.length).fill(115000), borderColor: '#ff6b6b', borderDash: [2, 2], pointRadius: 0 });
        datasets.push({ type: 'line', label: 'Premium 7D (15k)', data: new Array(labels.length).fill(15000), borderColor: '#feca57', borderDash: [3, 3], pointRadius: 0 });
        datasets.push({ type: 'line', label: 'Premium 28D (46k)', data: new Array(labels.length).fill(46000), borderColor: '#ff9ff3', borderDash: [2, 2], pointRadius: 0 });
      }

      if(instancesOfCharts[id]) { instancesOfCharts[id].destroy(); }
      instancesOfCharts[id] = new Chart(document.getElementById(id).getContext('2d'), {
        plugins: [ChartDataLabels],
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { color: '#fff', boxWidth: 12, fontSize: 10 } }, datalabels: { color: '#fff', anchor: 'end', align: 'top', formatter: fmt } },
          scales: { y: { ticks: { color: '#fff', callback: fmt } }, x: { ticks: { color: '#fff' } } }
        }
      });
    }

    function loadCategoryOverviewDashboard() {
      google.script.run.withSuccessHandler(d => {
        createTierChart('chart-cat-breakout-reach', 'Breakout Streamers', d.breakoutReach.labels, d.breakoutReach.values, false, false);
        createTierChart('chart-cat-breakout-hours', 'Breakout Hours ITD', d.breakoutHours.labels, d.breakoutHours.values, true, false);
        
        createTierChart('chart-cat-premium-reach', 'Premium Streamers', d.premiumReach.labels, d.premiumReach.values, false, false);
        createTierChart('chart-cat-premium-hours', 'Premium Hours ITD', d.premiumHours.labels, d.premiumHours.values, true, false);
        
        createTierChart('chart-cat-library-reach', 'Library Streamers', d.libraryReach.labels, d.libraryReach.values, false, false);
        createTierChart('chart-cat-library-hours', 'Library Hours ITD', d.libraryHours.labels, d.libraryHours.values, false, false);
      }).getCategoryOverviewDashboardData();
    }

    function loadCleanPerformanceTableData() {
      google.script.run.withSuccessHandler(d => {
        if(!d || d.length === 0) return;
        const table = document.getElementById('clean-performance-table');
        table.innerHTML = '';
        d.forEach((row, i) => {
          const tr = document.createElement('tr');
          row.forEach(cell => {
            const el = document.createElement(i === 0 ? 'th' : 'td');
            el.textContent = cell;
            tr.appendChild(el);
          });
          table.appendChild(tr);
        });
      }).getCleanPerformanceData();
    }

    function renderTable(data, id) { 
      const table = document.getElementById(id); table.innerHTML = '';
      data.forEach((row, i) => {
        const tr = document.createElement('tr');
        row.forEach((cell, ci) => {
          const el = document.createElement(i == 0 ? 'th' : 'td');
          if(id === 'main-table' && i > 0 && ci === 0) {
            const a = document.createElement('a'); a.textContent = cell; a.href='#';
            a.onclick = () => { loadTitleTab(cell); return false; };
            el.appendChild(a);
          } else { el.textContent = cell; }
          tr.appendChild(el);
        });
        table.appendChild(tr);
      });
    }
    
    function loadTitleTab(title) {
      showTab('title', document.querySelector('.tab-button[onclick*="title"]'));
      google.script.run.withSuccessHandler(d => {
        renderTable([d.headers, ...d.rows], 'title-table');
        document.getElementById('title-summary-target').textContent = 'Title: ' + d.summary.fieldE;
      }).getBatchDetails(title);
      google.script.run.withSuccessHandler(renderComparisonCharts).getTitleVisualData(title);
    }

    function renderComparisonCharts(data) {
      if(chartImp) chartImp.destroy(); if(chartPlay) chartPlay.destroy();
      const create = (id, label, key, color) => new Chart(document.getElementById(id).getContext('2d'), {
        type: 'bar', data: { labels: data.map(d=>d.container), datasets: [{ label, data: data.map(d=>d[key]), backgroundColor: color }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: '#fff' } }, y: { ticks: { color: '#fff' } } } }
      });
      chartImp = create('chart-impressions', 'Impressions', 'impressions', '#00e5ff');
      chartPlay = create('chart-plays', 'Plays', 'plays', '#1dd1a1');
    }

    function downloadRawData(sheetName, range, fileName) {
      google.script.run.withSuccessHandler(data => {
        const csv = data
          .map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
      }).downloadTableData(sheetName, range);
    }

    google.script.run.withSuccessHandler(d => renderTable(d, 'main-table')).getSheetData();
  </script>
</body>
</html>
