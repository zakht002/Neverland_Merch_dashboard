<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f9fafb; }

    .tabs { margin-bottom: 20px; }

    .tab-button {
      padding: 8px 16px;
      margin-right: 5px;
      border: none;
      background: #e5e7eb;
      cursor: pointer;
    }

    .tab-button.active {
      background: #3b82f6;
      color: white;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 25px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th { background: #f3f4f6; }
  </style>
</head>

<body>

<h2>Sheet Viewer</h2>

<div class="tabs">
  <button class="tab-button active" onclick="showTab('main', this)">Main</button>
  <button class="tab-button" onclick="showTab('breakout', this)">Breakout</button>
  <button class="tab-button" onclick="showTab('title', this)">Title</button>
</div>

<!-- MAIN -->
<div id="main" class="tab-content active">
  <h3>Current Sheet</h3>
  <table id="main-table"></table>
</div>

<!-- BREAKOUT -->
<div id="breakout" class="tab-content">
  <h3>Breakout Hours</h3>
  <table id="hours-table"></table>

  <h3>Breakout % Reach</h3>
  <table id="reach-table"></table>

  <h3>Performance Chart</h3>
  <div style="width:600px">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- ✅ NEW TITLE TAB -->
<div id="title" class="tab-content">
  <h3>Title Details</h3>
  <table id="title-table"></table>
</div>

<script>

// TAB SWITCH
let chartLoaded = false;

function showTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');

  if (btn) btn.classList.add('active');

  if (tabId === 'breakout' && !chartLoaded) {
    google.script.run.withSuccessHandler(renderChart).getChartData();
    chartLoaded = true;
  }
}

// TABLE RENDER
function renderTable(data, id) {
  const table = document.getElementById(id);
  table.innerHTML = '';

  data.forEach((row, i) => {
    const tr = document.createElement('tr');

    row.forEach((cell, colIndex) => {
      const el = document.createElement(i === 0 ? 'th' : 'td');

      // ✅ clickable titles (Main only)
      if (id === 'main-table' && i > 0 && colIndex === 0) {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = cell;

        a.onclick = function () {
          loadTitleTab(cell);
          return false;
        };

        el.appendChild(a);
      } else {
        el.textContent = cell || '';
      }

      tr.appendChild(el);
    });

    table.appendChild(tr);
  });
}

// ✅ LOAD TITLE TAB DATA
function loadTitleTab(title) {
  showTab('title', document.querySelector('[onclick*="title"]'));

  google.script.run.withSuccessHandler(function(data) {
    renderTitleTable(data);
  }).getBatchDetails(title);
}

// ✅ TITLE TABLE RENDERER
function renderTitleTable(data) {
  const container = document.getElementById('title-table');
  container.innerHTML = ''; // Clear previous

  // 1. Render Top Header Section
  const summaryDiv = document.createElement('div');
  summaryDiv.style.marginBottom = '20px';
  summaryDiv.innerHTML = `
    <p><strong>Title:</strong> ${data.summary.fieldE || 'N/A'} | 
       <strong>Field H:</strong> ${data.summary.fieldH || 'N/A'} | 
       <strong>Field J:</strong> ${data.summary.fieldJ || 'N/A'} | 
       <strong>Field AA:</strong> ${data.summary.fieldAA || 'N/A'}</p>
  `;
  container.appendChild(summaryDiv);

  // 2. Render Table
  const table = document.createElement('table');
  const trHead = document.createElement('tr');
  data.headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    trHead.appendChild(th);
  });
  table.appendChild(trHead);

  data.rows.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
  
  container.appendChild(table);
}

// LOAD TABLES
google.script.run.withSuccessHandler(d => renderTable(d, 'main-table')).getSheetData();

google.script.run.withSuccessHandler(d => {
  renderTable(d.hours, 'hours-table');
  renderTable(d.reach, 'reach-table');
}).getBreakoutData();

// CHART
let chartInstance;

function renderChart(data) {
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(document.getElementById('chart'), {
    type: 'bar', // Base type
    data: {
      labels: data.titles,
      datasets: [
        { label: '7D Fact', data: data.fact7, backgroundColor: '#3b82f6' }, // Blue bars
        { label: '28D Fact', data: data.fact28, backgroundColor: '#8b5cf6' }, // Purple bars
        { label: 'Current Fact', data: data.currentFact, backgroundColor: '#9ca3af' }, // Grey bars
        { 
          type: 'line', 
          label: '7D Goal', 
          data: data.goal7, 
          borderColor: 'red', 
          borderWidth: 2, 
          tension: 0, // Flat lines
          pointRadius: 0 
        },
        { 
          type: 'line', 
          label: '28D Goal', 
          data: data.goal28, 
          borderColor: 'green', 
          borderWidth: 2, 
          tension: 0, // Flat lines
          pointRadius: 0 
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: v => (v * 100).toFixed(0) + '%' }
        }
      }
    }
  });
}

</script>

</body>
</html>
